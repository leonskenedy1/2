name: Smart downloader 1.23
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter "URL" "v/a" "video resolution/audio bitrate" "video FPS (optional)"'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Parse input (Is it YouTube?)
        id: parse
        run: |
          INPUT="${{ github.event.inputs.url }}"
          IFS=' ' read -ra TOKENS <<< "$INPUT"
          current_url=""
          current_opts=()
          > tasks.txt
          for token in "${TOKENS[@]}"; do
            if [[ "$token" =~ ^https?:// ]]; then
              if [ -n "$current_url" ]; then
                echo "$current_url ${current_opts[*]}" >> tasks.txt
              fi
              current_url="$token"
              current_opts=()
            else
              current_opts+=("$token")
            fi
          done
          if [ -n "$current_url" ]; then
            echo "$current_url ${current_opts[*]}" >> tasks.txt
          fi
          if grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)' tasks.txt; then
            echo "IS_YOUTUBE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_YOUTUBE=false" >> $GITHUB_OUTPUT
          fi

      - name: Install tools (YouTube only)
        if: steps.parse.outputs.IS_YOUTUBE == 'true'
        run: |
          if ! command -v yt-dlp &> /dev/null; then
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          fi
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
            echo "$HOME/.deno/bin" >> $GITHUB_PATH
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Select format (YouTube only)
        if: steps.parse.outputs.IS_YOUTUBE == 'true'
        run: python3 Logic.py --select

      - name: Download
        run: python3 Logic.py --download

      - name: Remux (YouTube video only)
        run: python3 Logic.py --remux

      - name: Create & Upload to download folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if ! command -v inotifywait &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq inotify-tools
          fi

          rm -f download_queue.json selected_formats.json tasks.txt temp_*.json
          git gc --prune=now --quiet

          mkdir -p downloads final_downloads temp_downloads

          if [ ! -f download_manifest.json ]; then
            echo "No manifest found."
            exit 0
          fi

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 2147483648

          jq -c '.[]' download_manifest.json | while read -r entry; do
            is_yt=$(echo "$entry" | jq -r '.is_youtube')
            if [ "$is_yt" = "false" ]; then
              fname=$(echo "$entry" | jq -r '.files[0].filename')
              echo "Processing: $fname"
              (
                cd temp_downloads
                tar cf - "$fname" | nice -n 19 ionice -c 2 -n 7 zip -8 -s 99m -j "../final_downloads/${fname}.zip" -
                rm -f "$fname"
              ) &
            else
              title=$(echo "$entry" | jq -r '.title')
              mapfile -t video_array < <(echo "$entry" | jq -r '.files[] | select(.type == "video") | .filename')
              mapfile -t audio_array < <(echo "$entry" | jq -r '.files[] | select(.type == "audio") | .filename')

              if [ ${#video_array[@]} -gt 0 ]; then
                echo "Processing videos of $title"
                (
                  cd temp_downloads
                  tar cf - "${video_array[@]}" | nice -n 19 ionice -c 2 -n 7 zip -8 -s 99m -j "../final_downloads/${title}_videos.zip" -
                  rm -f "${video_array[@]}"
                ) &
              fi
              if [ ${#audio_array[@]} -gt 0 ]; then
                echo "Processing audios of $title"
                (
                  cd temp_downloads
                  tar cf - "${audio_array[@]}" | nice -n 19 ionice -c 2 -n 7 zip -8 -s 99m -j "../final_downloads/${title}_audios.zip" -
                  rm -f "${audio_array[@]}"
                ) &
              fi
            fi

            process_part() {
              local part="$1"
              local base
              base=$(basename "$part")
              mv "$part" "downloads/$base"
              git add "downloads/$base"
              if git diff --cached --quiet; then
                echo "No changes for $base"
              else
                git pull --rebase --autostash origin "$BRANCH"
                git commit -m "Add part $base [skip ci]"
                pushed=false
                for attempt in $(seq 1 20); do
                  if git push origin "$BRANCH"; then
                    echo "Successfully pushed $base"
                    pushed=true
                    break
                  else
                    echo "Push attempt $attempt/20 failed for $base, retrying..."
                    git pull --rebase --autostash origin "$BRANCH"
                    sleep 2
                  fi
                done
                if [ "$pushed" = false ]; then
                  echo "ERROR: Failed to push $base after 20 attempts."
                fi
                rm -f "downloads/$base"
              fi
            }

            while [ $(jobs -r -p | wc -l) -gt 0 ] || [ -n "$(ls final_downloads)" ]; do
              if new_file=$(inotifywait -q -e close_write -e moved_to --timeout 10 --format '%f' final_downloads 2>/dev/null); then
                part="final_downloads/$new_file"
                [ -f "$part" ] && process_part "$part"
              else
                for part in final_downloads/*; do
                  [ -f "$part" ] || continue
                  process_part "$part"
                done
              fi
            done
            wait

            for part in final_downloads/*; do
              [ -f "$part" ] || continue
              process_part "$part"
            done
          done

          echo "All files uploaded to the 'downloads' folder."
