name: Fetch file and push split zip to repo (parts < 100 MB)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct link to the file'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download file to temporary location
        run: |
          mkdir -p temp_download
          cd temp_download
          wget --progress=bar:force --content-disposition "${{ github.event.inputs.url }}"

      - name: Create split zip archive (each part ≤ 95 MB)
        run: |
          mkdir -p downloads
          cd temp_download
          FILE=$(ls -1)
          cd ..
          zip -s 95m -r "downloads/${FILE}.zip" "temp_download/${FILE}"

      - name: Commit and push parts to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000
          git add downloads/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add downloaded file parts [skip ci]"
            git push
          fi
