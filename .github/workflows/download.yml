name: Fetch file and push split zip in small batches

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct link to the file'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download file
        run: |
          mkdir -p temp_download
          cd temp_download
          wget --progress=bar:force --content-disposition "${{ github.event.inputs.url }}"

      - name: Create split zip (each part ≤ 98 MB)
        run: |
          cd temp_download
          FILE=$(ls -1)
          cd ..
          mkdir -p downloads
          zip -s 98m -r "downloads/${FILE}.zip" "temp_download/${FILE}"

      - name: Batch commit & push parts
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          FILES=(downloads/*)
          total=${#FILES[@]}

          # 18 files × 98 MB ≈ 1.76 GB per push (safe under 2 GB)
          BATCH=18
          start=0

          while [ $start -lt $total ]; do
            end=$(( start + BATCH ))
            if [ $end -gt $total ]; then end=$total; fi

            git add "${FILES[@]:start:end-start}"
            git commit -m "Add parts $(($start+1))-$end [skip ci]"
            git push origin "$BRANCH"

            start=$end
          done

          echo "All files uploaded to the 'downloads' folder."
