name: Fetch file and commit split zip via API (fixed blob)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct link to the file'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download file
        run: |
          mkdir -p temp_download
          cd temp_download
          wget --progress=bar:force --content-disposition "${{ github.event.inputs.url }}"

      - name: Create split zip (parts ≤ 95 MB)
        run: |
          cd temp_download
          FILE=$(ls -1)
          cd ..
          mkdir -p downloads
          zip -s 95m -r "downloads/${FILE}.zip" "temp_download/${FILE}"

      - name: Upload parts via GitHub API (no push limit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          REPO="${{ env.REPO }}"
          BRANCH="${BRANCH:-main}"

          # Get latest commit and tree SHA
          COMMIT_DATA=$(gh api "repos/$REPO/branches/$BRANCH" --jq '.commit.sha, .commit.commit.tree.sha')
          LATEST_COMMIT_SHA=$(echo "$COMMIT_DATA" | sed -n '1p')
          BASE_TREE_SHA=$(echo "$COMMIT_DATA" | sed -n '2p')

          # Build tree entries
          ENTRIES="["
          FIRST=true
          for f in downloads/*; do
            filename=$(basename "$f")
            # Create blob using proper JSON with base64 content (streamed, no variable storage)
            BLOB_SHA=$(
              jq -n --rawfile content <(base64 -w0 "$f") \
                 --arg encoding "base64" \
                 '{content: $content, encoding: $encoding}' \
              | gh api "repos/$REPO/git/blobs" --input - --jq '.sha'
            )
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              ENTRIES+=","
            fi
            ENTRIES+="{\"path\":\"downloads/$filename\",\"mode\":\"100644\",\"type\":\"blob\",\"sha\":\"$BLOB_SHA\"}"
          done
          ENTRIES+="]"

          # Create new tree
          NEW_TREE_SHA=$(gh api "repos/$REPO/git/trees" \
            -f base_tree="$BASE_TREE_SHA" \
            -f tree="$ENTRIES" \
            --jq '.sha')

          # Create commit
          NEW_COMMIT_SHA=$(gh api "repos/$REPO/git/commits" \
            -f message="Add downloaded file parts" \
            -f tree="$NEW_TREE_SHA" \
            -f parents[]="$LATEST_COMMIT_SHA" \
            --jq '.sha')

          # Update branch reference
          gh api "repos/$REPO/git/refs/heads/$BRANCH" \
            -X PATCH \
            -f sha="$NEW_COMMIT_SHA"

          echo "Upload complete. Files are in the 'downloads' folder."
