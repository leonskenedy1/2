name: Fetch file from direct link

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct link to the file'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Download file using wget
        run: |
          mkdir -p download
          cd download
          wget --content-disposition "${{ github.event.inputs.url }}"

      - name: Upload file to Release
        uses: softprops/action-gh-release@v2
        with:
          files: download/*
          tag_name: file_${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
