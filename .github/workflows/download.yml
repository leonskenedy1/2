name: Fetch file and push split zip to repo

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct link to the file'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download file to temporary location
        run: |
          mkdir -p temp_download
          cd temp_download
          wget --progress=bar:force --content-disposition "${{ github.event.inputs.url }}"

      - name: Create zip (single or multi-part) in downloads folder
        run: |
          mkdir -p downloads
          cd temp_download
          FILE=$(ls -1)
          cd ..
          SIZE=$(stat -c%s "temp_download/${FILE}")
          if [ $SIZE -gt 536870912 ]; then
            echo "File larger than 512 MiB, splitting into multi-part zip..."
            zip -s 512M -r "downloads/${FILE}.zip" "temp_download/${FILE}"
          else
            echo "Small file, single zip archive."
            zip "downloads/${FILE}.zip" "temp_download/${FILE}"
          fi

      - name: Commit and push files to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add downloads/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add downloaded file [skip ci]"
            git push
          fi
