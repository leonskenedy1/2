name: Fetch file (one-line input, smart YouTube, clean progress)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter "URL" or "URL v 720" / "URL a 128" (optional FPS)'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install yt-dlp, jq and Deno for YouTube challenges
        run: |
          # yt-dlp
          if ! command -v yt-dlp &> /dev/null; then
            sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
            sudo chmod a+rx /usr/local/bin/yt-dlp
          fi
          # jq
          if ! command -v jq &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi
          # Deno (a modern JS runtime that can import npm packages on-the-fly)
          if ! command -v deno &> /dev/null; then
            curl -fsSL https://deno.land/install.sh | sh -s -- -y
            echo "$HOME/.deno/bin" >> $GITHUB_PATH
          fi

      - name: Parse input and download
        run: |
          INPUT="${{ github.event.inputs.url }}"
          read -r link type val1 val2 <<< "$INPUT"

          is_youtube() {
            echo "$1" | grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)'
          }

          # --- Helper: download with a progress line every 1 second ---
          download_with_progress() {
            local yt_args="$1"
            local output_template="$2"
            local total_size="$3"
            local url="$4"

            # Start yt-dlp in background using its own progress (hidden later)
            yt-dlp $yt_args -o "$output_template" "$url" &
            local dl_pid=$!

            # Monitor loop: print one line per second with current size
            local output_dir="$(dirname "$output_template")"
            local base="$(basename "$output_template" | sed 's/%(ext)s/*/')"  # not perfect, we'll watch .part
            sleep 1  # Wait for yt-dlp to create the .part file

            while kill -0 $dl_pid 2>/dev/null; do
              # Find the .part file written by yt-dlp (allows any extension)
              local part_file=$(ls "$output_dir"/*.part 2>/dev/null | head -n1)
              if [ -n "$part_file" ]; then
                local current=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                if [ "$total_size" -gt 0 ]; then
                  local percent=$(awk -v cur="$current" -v total="$total_size" 'BEGIN {printf "%.1f", (cur/total)*100}')
                  echo "[yt-dlp] ${current} / ${total_size} bytes (${percent}%)"
                else
                  echo "[yt-dlp] ${current} bytes downloaded (total unknown)"
                fi
              else
                echo "[yt-dlp] Waiting for download to start..."
              fi
              sleep 1
            done

            # Final message after completion
            wait $dl_pid
            local final_file=$(ls "$output_dir"/*.part 2>/dev/null | head -n1)
            if [ -n "$final_file" ]; then
              local final_size=$(stat -c%s "$final_file")
              echo "[yt-dlp] Completed: ${final_size} bytes"
            fi
          }

          # --- Main logic ---
          if ! is_youtube "$link"; then
            echo "Non-YouTube link. Downloading with wget..."
            mkdir -p temp_download
            cd temp_download
            wget --progress=bar:force --content-disposition "$link"
            cd ..
          else
            echo "YouTube link detected."

            if [[ "$type" != "v" && "$type" != "a" ]]; then
              type="v"
              val1="max"
              val2=""
            fi

            if [[ "$type" == "v" ]]; then
              case "$val1" in
                2k) val1=1440 ;;
                4k) val1=2160 ;;
              esac
            fi

            echo "Quality spec: $type $val1 $val2"
            
            # Base arguments for yt-dlp (no progress bar, Deno, cookies, etc.)
            YT_DLP_ARGS="--cookies cookies.txt --js-runtimes deno --remote-components ejs:npm --no-progress"
            
            VIDEO_JSON=$(yt-dlp $YT_DLP_ARGS -j "$link")
            TOTAL_SIZE=0

            if [[ "$type" == "v" ]]; then
              echo "Selecting video with audio..."
              COMBINED=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec != "none" and .acodec != "none")]')
              case "$val1" in
                max)
                  FORMAT_ID=$(echo "$COMBINED" | jq -r 'max_by(.height, .fps) | .format_id')
                  ;;
                min)
                  FORMAT_ID=$(echo "$COMBINED" | jq -r 'min_by(.height, .fps) | .format_id')
                  ;;
                *)
                  HEIGHT="$val1"
                  FPS="${val2:-0}"
                  HEIGHTS=$(echo "$COMBINED" | jq '[.[].height] | unique | sort')
                  CHOSEN_HEIGHT=$(echo "$HEIGHTS" | jq --argjson h "$HEIGHT" 'map({h:., d:(. - $h | abs)}) | sort_by(.d, .h) | first.h')
                  MATCHING=$(echo "$COMBINED" | jq --argjson h "$CHOSEN_HEIGHT" 'map(select(.height == $h))')
                  if [ "$FPS" -gt 0 ]; then
                    EXACT=$(echo "$MATCHING" | jq --argjson f "$FPS" 'map(select(.fps == $f))')
                    if [ "$(echo "$EXACT" | jq 'length')" -gt 0 ]; then
                      FORMAT_ID=$(echo "$EXACT" | jq -r 'first.format_id')
                    else
                      FORMAT_ID=$(echo "$MATCHING" | jq -r 'max_by(.fps) | .format_id')
                    fi
                  else
                    FORMAT_ID=$(echo "$MATCHING" | jq -r 'max_by(.fps) | .format_id')
                  fi
                  ;;
              esac

              if [ -z "$FORMAT_ID" ]; then
                echo "No combined format found, falling back to bestvideo+bestaudio merge."
                # Approximate size: try to get max size from bestvideo+bestaudio
                TOTAL_SIZE=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec!="none" or .acodec!="none")] | max_by(.filesize // .filesize_approx // 0) | .filesize // .filesize_approx // 0')
                download_with_progress "$YT_DLP_ARGS -f bestvideo[height<=$HEIGHT]+bestaudio/best" "temp_download/%(title)s.%(ext)s" "$TOTAL_SIZE" "$link"
              else
                # Get size from chosen format
                TOTAL_SIZE=$(echo "$VIDEO_JSON" | jq -r ".formats[] | select(.format_id == \"$FORMAT_ID\") | .filesize // .filesize_approx // 0")
                mkdir -p temp_download
                download_with_progress "$YT_DLP_ARGS -f $FORMAT_ID" "temp_download/%(title)s.%(ext)s" "$TOTAL_SIZE" "$link"
              fi

            elif [[ "$type" == "a" ]]; then
              echo "Selecting audio only..."
              AUDIO_FORMATS=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.vcodec == "none" and .acodec != "none")]')
              case "$val1" in
                max)
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'max_by(.abr // .tbr) | .format_id')
                  ;;
                min)
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r 'min_by(.abr // .tbr) | .format_id')
                  ;;
                *)
                  BITRATE="$val1"
                  BITRATES=$(echo "$AUDIO_FORMATS" | jq '[.[].abr // .tbr] | unique | sort')
                  CHOSEN_BITRATE=$(echo "$BITRATES" | jq --argjson b "$BITRATE" 'map({br:., d:(. - $b | abs)}) | sort_by(.d, .br) | first.br')
                  FORMAT_ID=$(echo "$AUDIO_FORMATS" | jq -r --argjson br "$CHOSEN_BITRATE" 'map(select((.abr // .tbr) == $br)) | first.format_id')
                  ;;
              esac

              if [ -z "$FORMAT_ID" ]; then
                echo "Falling back to bestaudio."
                TOTAL_SIZE=$(echo "$VIDEO_JSON" | jq '[.formats[] | select(.acodec!="none")] | max_by(.filesize // .filesize_approx // 0) | .filesize // .filesize_approx // 0')
                download_with_progress "$YT_DLP_ARGS -f bestaudio" "temp_download/%(title)s.%(ext)s" "$TOTAL_SIZE" "$link"
              else
                TOTAL_SIZE=$(echo "$VIDEO_JSON" | jq -r ".formats[] | select(.format_id == \"$FORMAT_ID\") | .filesize // .filesize_approx // 0")
                mkdir -p temp_download
                download_with_progress "$YT_DLP_ARGS -f $FORMAT_ID" "temp_download/%(title)s.%(ext)s" "$TOTAL_SIZE" "$link"
              fi
            fi
          fi

      - name: Create split zip (each part ≤ 98 MB)
        run: |
          cd temp_download
          FILE=$(ls -1)
          cd ..
          mkdir -p downloads
          zip -s 98m -r "downloads/${FILE}.zip" "temp_download/${FILE}"

      - name: Batch commit & push parts
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          FILES=(downloads/*)
          total=${#FILES[@]}
          BATCH=18
          start=0

          while [ $start -lt $total ]; do
            end=$(( start + BATCH ))
            if [ $end -gt $total ]; then end=$total; fi
            git add "${FILES[@]:start:end-start}"
            git commit -m "Add parts $(($start+1))-$end [skip ci]"
            git push origin "$BRANCH"
            start=$end
          done

          echo "All files uploaded to the 'downloads' folder."
